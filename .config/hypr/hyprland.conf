# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor = eDP-1, 2560x1440@120, 0x0, 1
monitor = DP-1, 1920x1080@144, 0x0, 1,
monitor = HDMI-A-2, 2560x1080@60, 1920x0, 1
# monitor = HDMI-A-1, 4096x2160@60, 2560x0, 3

# Set HDMI-A-1 as the primary monitor
exec-once = xrandr --output DP-1 --primary

###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = alacritty
$fileManager = dolphin
$menu = /home/sleuth/.config/rofi/launchers/type-4/launcher.sh


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
# exec-once = hyprpanel
exec-once = fcitx5
exec-once = waybar
exec-once = swaync
exec-once = vesktop
exec-once = blueman-applet
# Execute the modifier key switching script
exec-once = ~/.config/hypr/scripts/modifier_switch.sh
exec-once = dbus-update-activation-environment --systemd --all
exec-once = ssh-agent -D -a $XDG_RUNTIME_DIR/ssh-agent.socket


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
# env = WLR_DRM_DEVICES,/dev/dri/card2:/dev/dri/card1
env = LIBVA_DRIVER_NAME, radeonsi
env = LIBVA_DRIVERS_PATH, /usr/lib/dri
env = VDPAU_DRIVER, radeonsi
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
# env = QT_STYLE_OVERRIDE,kvantum
#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 0

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgba(122,162,247,1)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 1
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = no, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 1, default
    animation = border, 1, 1, easeOutQuint
    animation = windows, 1, 1, easeOutQuint
    animation = windowsIn, 1, 1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1, linear, popin 87%
    animation = fadeIn, 1, 1, almostLinear
    animation = fadeOut, 1, 1, almostLinear
    animation = fade, 1, 1, quick
    animation = layers, 1, 1, easeOutQuint
    animation = layersIn, 1, 1, easeOutQuint, fade
    animation = layersOut, 1, 1, linear, fade
    animation = fadeLayersIn, 1, 1, almostLinear
    animation = fadeLayersOut, 1, 1, almostLinear
    animation = workspaces, 1, 1, almostLinear
    animation = workspacesIn, 1, 1, almostLinear
    animation = workspacesOut, 1, 1, almostLinear
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    accel_profile = flat

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
        scroll_factor = 0.6
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe_touch = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# Source the default keybindings file. The script will dynamically change this.
source = ~/.config/hypr/keys-alt.conf


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

workspace = 1, monitor:DP-1
workspace = 2, monitor:DP-1
workspace = 3, monitor:HDMI-A-2
workspace = 4, monitor:DP-1

# Window rules
windowrule {
  name = vesktop-ws
  match:class = ^(vesktop)$
  workspace = 3 silent
}

# Godot Project Settings - specific size
windowrule {
  name = godot-project-settings
  match:initial_class = ^(org\.godotengine\.Editor)$
  match:initial_title = ^(Project Settings).*

  float = on
  size = 1280 720
  center = on
  workspace = 4
}

# Godot Editor Settings - specific size
windowrule {
  name = godot-editor-settings
  match:initial_class = ^(org\.godotengine\.Editor)$
  match:initial_title = ^(Editor Settings).*

  float = on
  size = 1280 720
  center = on
  workspace = 4
}

# Godot Create New Node dialog - specific size
windowrule {
  name = godot-create-node
  match:initial_class = ^(org\.godotengine\.Editor)$
  match:initial_title = ^(Create New Node)$

  float = on
  size = 1340 804
  center = on
  workspace = 4
}

# Godot Editor - main window only (matches initialTitle: Godot)
windowrule {
  name = godot-editor-main
  match:initial_class = ^(org\.godotengine\.Editor)$
  match:initial_title = ^(Godot)$

  float = on
  size = 1916 1052
  center = on
  workspace = 4
}

# Godot Project Manager (near fullscreen)
windowrule {
  name = godot-project-manager
  match:initial_class = ^(org\.godotengine\.ProjectManager)$

  float = on
  size = 1916 1052
  center = on
  workspace = 4
}

# Godot Debug/Game window (smaller) - matches your project name
windowrule {
  name = godot-debug-window
  match:class = ^(Godot .*)$

  float = on
  size = 1152 648
  center = on
}
